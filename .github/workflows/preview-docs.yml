name: Preview Docs

on: pull_request

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Setup Fern CLI
        uses: fern-api/setup-fern-cli@v1

      - name: Validate Fern project
        run: fern check

      - name: Generate preview URL
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
          HEAD_REF: ${{ github.head_ref }}
        run: fern generate --docs --preview --id "$HEAD_REF" --no-prompt
